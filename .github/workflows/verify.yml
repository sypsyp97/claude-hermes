name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Pinned bun matches dev/CI baseline; "latest" catches Bun regressions
        # that would hit users on `curl -fsSL https://bun.sh/install | bash`.
        bun: ["1.3.4", "latest"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Lint workflow files
        if: matrix.os == 'ubuntu-latest' && matrix.bun == '1.3.4'
        uses: raven-actions/actionlint@v2
        with:
          fail_on_error: true

      - name: Verify (typecheck + lint + unit + smoke + integration)
        run: bun run verify

      - name: Coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.bun == '1.3.4'
        run: |
          {
            echo "## Coverage (\`bun test src --coverage\`)"
            echo ""
            echo '```'
            bun test src --coverage 2>&1 | tail -120 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
